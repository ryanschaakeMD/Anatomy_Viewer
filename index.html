<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Anatomy Image Stack Viewer</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: #ffffff;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        /* --- Login Overlay CSS --- */
        #login-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #1a1a1a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999; /* Keeps the login screen on top of everything */
        }

        #login-box {
            background-color: #2a2a2a;
            padding: 40px;
            border-radius: 8px;
            border: 1px solid #444;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        #login-box input {
            padding: 10px;
            font-size: 1rem;
            margin-bottom: 15px;
            border: 1px solid #555;
            border-radius: 4px;
            background-color: #111;
            color: #fff;
            width: 80%;
        }

        #login-box button {
            padding: 10px 20px;
            font-size: 1rem;
            cursor: pointer;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
        }

        #login-box button:hover {
            background-color: #0056b3;
        }

        #error-msg {
            color: #ff4d4d;
            margin-top: 15px;
            display: none; /* Hidden by default */
        }

        /* --- Viewer CSS --- */
        #viewer-container {
            position: relative;
            width: 100vw;       
            max-width: 512px;   
            aspect-ratio: 1 / 1; 
            background-color: #000;
            overflow: hidden;
            border: 1px solid #333;
            touch-action: none; 
        }

        #anatomy-image {
            width: 100%;
            height: 100%;
            object-fit: contain;
            pointer-events: none; 
        }

        #slice-indicator {
            margin-top: 15px;
            font-size: 1.2rem;
        }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div id="login-box">
            <h2>Atlas Access</h2>
            <input type="password" id="password-input" placeholder="Enter Password">
            <br>
            <button id="login-btn">Submit</button>
            <div id="error-msg">Incorrect password. Please try again.</div>
        </div>
    </div>

    <div id="viewer-container">
        <img id="anatomy-image" src="images/axial_0.webp" alt="Anatomy Slice">
    </div>

    <div id="slice-indicator">Slice: 0 / 99</div>

    <script>
        // --- Password Logic ---
        const loginOverlay = document.getElementById('login-overlay');
        const passwordInput = document.getElementById('password-input');
        const loginBtn = document.getElementById('login-btn');
        const errorMsg = document.getElementById('error-msg');

        function checkPassword() {
            if (passwordInput.value === 'Sburad1!') {
                loginOverlay.style.display = 'none'; // Hide the login screen
            } else {
                errorMsg.style.display = 'block'; // Show error message
                passwordInput.value = ''; // Clear the input
            }
        }

        // Trigger login on button click
        loginBtn.addEventListener('click', checkPassword);

        // Trigger login when hitting the "Enter" key
        passwordInput.addEventListener('keypress', (event) => {
            if (event.key === 'Enter') {
                checkPassword();
            }
        });


        // --- Configuration ---
        const totalSlices = 100; // Update this to match your actual extracted frame count
        const imagePrefix = 'images/axial_'; 
        const imageExtension = '.webp';
        
        // --- State ---
        let currentSlice = 0;

        // --- DOM Elements ---
        const viewerContainer = document.getElementById('viewer-container');
        const anatomyImage = document.getElementById('anatomy-image');
        const sliceIndicator = document.getElementById('slice-indicator');

        // --- Core Function ---
        function updateViewer() {
            anatomyImage.src = `${imagePrefix}${currentSlice}${imageExtension}`;
            sliceIndicator.textContent = `Slice: ${currentSlice} / ${totalSlices - 1}`;
        }

        // --- Desktop Interaction (Mouse Wheel) ---
        viewerContainer.addEventListener('wheel', (event) => {
            event.preventDefault(); 

            if (event.deltaY > 0) {
                currentSlice++;
            } else if (event.deltaY < 0) {
                currentSlice--;
            }

            if (currentSlice < 0) currentSlice = 0;
            else if (currentSlice >= totalSlices) currentSlice = totalSlices - 1;

            updateViewer();
        }, { passive: false }); 

        // --- Mobile Interaction (Touch Swipe) ---
        let startY = 0;
        const sensitivity = 15; 

        viewerContainer.addEventListener('touchstart', (event) => {
            startY = event.touches[0].clientY;
        }, { passive: true });

        viewerContainer.addEventListener('touchmove', (event) => {
            event.preventDefault(); 

            let currentY = event.touches[0].clientY;
            let difference = startY - currentY; 

            if (Math.abs(difference) > sensitivity) {
                if (difference > 0) {
                    currentSlice++; 
                } else {
                    currentSlice--; 
                }

                if (currentSlice < 0) currentSlice = 0;
                else if (currentSlice >= totalSlices) currentSlice = totalSlices - 1;

                updateViewer();
                startY = currentY; 
            }
        }, { passive: false });
    </script>
</body>
</html>
