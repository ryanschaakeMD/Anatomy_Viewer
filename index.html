<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Anatomy Image Stack Viewer</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: #ffffff;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        /* Updated CSS for responsive scaling on mobile and desktop */
        #viewer-container {
            position: relative;
            width: 100vw;       /* Stretch to the full width of the screen */
            max-width: 512px;   /* Don't get larger than 512px on desktop */
            aspect-ratio: 1 / 1; /* Keep it a perfect square */
            background-color: #000;
            overflow: hidden;
            border: 1px solid #333;
            touch-action: none; /* Prevents default browser pinch-to-zoom on the image */
        }

        #anatomy-image {
            width: 100%;
            height: 100%;
            object-fit: contain;
            pointer-events: none; /* Prevents the image from being dragged accidentally */
        }

        #slice-indicator {
            margin-top: 15px;
            font-size: 1.2rem;
        }
    </style>
</head>
<body>

    <div id="viewer-container">
        <img id="anatomy-image" src="images/axial_0.webp" alt="Anatomy Slice">
    </div>

    <div id="slice-indicator">Slice: 0 / 99</div>

    <script>
        // --- Configuration ---
        const totalSlices = 25; // Update this to match your actual extracted frame count
        const imagePrefix = 'images/axial_'; // Use 'file:///C:/Users/ryans/Videos/images/axial_' if HTML is kept outside
        const imageExtension = '.webp';
        
        // --- State ---
        let currentSlice = 0;

        // --- DOM Elements ---
        const viewerContainer = document.getElementById('viewer-container');
        const anatomyImage = document.getElementById('anatomy-image');
        const sliceIndicator = document.getElementById('slice-indicator');

        // --- Core Function ---
        function updateViewer() {
            // Update the image source
            anatomyImage.src = `${imagePrefix}${currentSlice}${imageExtension}`;
            
            // Update the text indicator
            sliceIndicator.textContent = `Slice: ${currentSlice} / ${totalSlices - 1}`;
        }

        // --- Desktop Interaction (Mouse Wheel) ---
        viewerContainer.addEventListener('wheel', (event) => {
            event.preventDefault(); 

            if (event.deltaY > 0) {
                currentSlice++;
            } else if (event.deltaY < 0) {
                currentSlice--;
            }

            // Clamp the slice index
            if (currentSlice < 0) currentSlice = 0;
            else if (currentSlice >= totalSlices) currentSlice = totalSlices - 1;

            updateViewer();
        }, { passive: false }); 

        // --- Mobile Interaction (Touch Swipe) ---
        let startY = 0;
        const sensitivity = 15; // How many pixels of swiping equals one slice change

        viewerContainer.addEventListener('touchstart', (event) => {
            // Record where the user's finger first touched the screen
            startY = event.touches[0].clientY;
        }, { passive: true });

        viewerContainer.addEventListener('touchmove', (event) => {
            event.preventDefault(); 

            let currentY = event.touches[0].clientY;
            let difference = startY - currentY; 

            // Check if the finger has moved far enough to trigger a slice change
            if (Math.abs(difference) > sensitivity) {
                if (difference > 0) {
                    currentSlice++; // Swiped up
                } else {
                    currentSlice--; // Swiped down
                }

                // Clamp the slice index
                if (currentSlice < 0) currentSlice = 0;
                else if (currentSlice >= totalSlices) currentSlice = totalSlices - 1;

                updateViewer();

                // Reset start position for continuous smooth swiping
                startY = currentY; 
            }
        }, { passive: false });

        // --- Preload Images (Optional but recommended for smoother scrolling) ---
        function preloadImages() {
            for (let i = 0; i < totalSlices; i++) {
                const img = new Image();
                img.src = `${imagePrefix}${i}${imageExtension}`;
            }
        }
        
        // Uncomment the line below to enable preloading
        // preloadImages(); 
    </script>
</body>
</html>
